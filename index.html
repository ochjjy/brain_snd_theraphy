<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>40Hz AM Audio</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f5;
      --ink: #18201c;
      --muted: #62706a;
      --panel: #ffffff;
      --line: #d8ded8;
      --accent: #0f7b6c;
      --accent-dark: #095c50;
      --warn: #8a4b10;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(24, 32, 28, 0.08);
      padding: clamp(20px, 4vw, 36px);
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 3vw, 2.7rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .status {
      min-width: 96px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .status.playing {
      color: var(--accent-dark);
      border-color: rgba(15, 123, 108, 0.35);
      background: rgba(15, 123, 108, 0.08);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin: 0 0 24px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--ink);
      font-size: 0.95rem;
      font-weight: 650;
    }

    .value {
      color: var(--muted);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 13px 18px;
      min-width: 112px;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
    }

    #play {
      color: #ffffff;
      background: var(--accent);
    }

    #play:hover {
      background: var(--accent-dark);
    }

    #stop {
      color: var(--ink);
      background: #edf1ed;
    }

    #stop:hover {
      background: #e1e7e1;
    }

    .note {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--warn);
      font-size: 0.92rem;
    }

    @media (max-width: 620px) {
      body {
        padding: 14px;
      }

      header,
      .controls {
        grid-template-columns: 1fr;
        display: grid;
      }

      .status {
        width: fit-content;
      }

      button {
        flex: 1 1 120px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>40Hz AM Audio</h1>
        <p>가청 캐리어 톤의 진폭을 40Hz로 변조해 재생합니다.</p>
      </div>
      <div id="status" class="status">정지</div>
    </header>

    <section class="controls" aria-label="audio controls">
      <label>
        캐리어 주파수 <span id="carrierValue" class="value">440 Hz</span>
        <input id="carrier" type="range" min="120" max="880" step="1" value="440">
      </label>

      <label>
        변조 주파수 <span id="modValue" class="value">40 Hz</span>
        <input id="mod" type="range" min="1" max="80" step="1" value="40">
      </label>

      <label>
        볼륨 <span id="volumeValue" class="value">20%</span>
        <input id="volume" type="range" min="0" max="70" step="1" value="20">
      </label>

      <label>
        지속 시간 <span id="durationValue" class="value">10초</span>
        <input id="duration" type="range" min="1" max="60" step="1" value="10">
      </label>
    </section>

    <div class="actions">
      <button id="play" type="button">재생</button>
      <button id="stop" type="button">정지</button>
    </div>

    <p class="note">의료적 진단이나 치료 목적의 도구가 아닙니다. 처음에는 낮은 볼륨으로 짧게 확인하세요.</p>
  </main>

  <script>
    const controls = {
      carrier: document.querySelector("#carrier"),
      mod: document.querySelector("#mod"),
      volume: document.querySelector("#volume"),
      duration: document.querySelector("#duration"),
    };

    const labels = {
      carrier: document.querySelector("#carrierValue"),
      mod: document.querySelector("#modValue"),
      volume: document.querySelector("#volumeValue"),
      duration: document.querySelector("#durationValue"),
      status: document.querySelector("#status"),
    };

    const playButton = document.querySelector("#play");
    const stopButton = document.querySelector("#stop");

    let audioContext;
    let source;
    let timeoutId;

    function updateLabels() {
      labels.carrier.textContent = `${controls.carrier.value} Hz`;
      labels.mod.textContent = `${controls.mod.value} Hz`;
      labels.volume.textContent = `${controls.volume.value}%`;
      labels.duration.textContent = `${controls.duration.value}초`;
    }

    function setStatus(isPlaying) {
      labels.status.textContent = isPlaying ? "재생 중" : "정지";
      labels.status.classList.toggle("playing", isPlaying);
      playButton.textContent = isPlaying ? "다시 재생" : "재생";
    }

    function stopSound() {
      clearTimeout(timeoutId);

      if (source) {
        const currentSource = source;
        source = null;

        try {
          currentSource.stop();
        } catch (error) {
          // Already stopped sources throw in some browsers.
        }
        currentSource.disconnect();
      }

      setStatus(false);
    }

    function createAmBuffer(context, duration, carrierFreq, modFreq, volume) {
      const sampleRate = context.sampleRate;
      const frameCount = Math.floor(sampleRate * duration);
      const buffer = context.createBuffer(1, frameCount, sampleRate);
      const samples = buffer.getChannelData(0);
      const fadeFrames = Math.min(Math.floor(sampleRate * 0.02), Math.floor(frameCount / 2));

      for (let i = 0; i < frameCount; i += 1) {
        const t = i / sampleRate;
        const carrier = Math.sin(2 * Math.PI * carrierFreq * t);
        const envelope = 0.5 * (1 + Math.sin((2 * Math.PI * modFreq * t) - (Math.PI / 2)));
        let fade = 1;

        if (i < fadeFrames) {
          fade = i / fadeFrames;
        } else if (i > frameCount - fadeFrames) {
          fade = (frameCount - i) / fadeFrames;
        }

        samples[i] = carrier * envelope * volume * fade;
      }

      return buffer;
    }

    async function playSound() {
      stopSound();

      audioContext = audioContext || new AudioContext();
      if (audioContext.state === "suspended") {
        await audioContext.resume();
      }

      const carrierFreq = Number(controls.carrier.value);
      const modFreq = Number(controls.mod.value);
      const volume = Number(controls.volume.value) / 100;
      const duration = Number(controls.duration.value);

      const currentSource = audioContext.createBufferSource();
      currentSource.buffer = createAmBuffer(audioContext, duration, carrierFreq, modFreq, volume);
      currentSource.connect(audioContext.destination);
      currentSource.onended = () => {
        if (source === currentSource) {
          clearTimeout(timeoutId);
          source = null;
          setStatus(false);
        }
      };
      source = currentSource;
      currentSource.start();

      timeoutId = setTimeout(stopSound, duration * 1000 + 100);
      setStatus(true);
    }

    Object.values(controls).forEach((control) => {
      control.addEventListener("input", updateLabels);
    });

    playButton.addEventListener("click", playSound);
    stopButton.addEventListener("click", stopSound);
    updateLabels();
  </script>
</body>
</html>
