<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brain Sound AM Audio</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f5;
      --ink: #18201c;
      --muted: #62706a;
      --panel: #ffffff;
      --line: #d8ded8;
      --accent: #0f7b6c;
      --accent-dark: #095c50;
      --warn: #8a4b10;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(24, 32, 28, 0.08);
      padding: clamp(20px, 4vw, 36px);
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 3vw, 2.7rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .status {
      min-width: 96px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .status.playing {
      color: var(--accent-dark);
      border-color: rgba(15, 123, 108, 0.35);
      background: rgba(15, 123, 108, 0.08);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin: 0 0 24px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--ink);
      font-size: 0.95rem;
      font-weight: 650;
    }

    .value {
      color: var(--muted);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"],
    select {
      width: 100%;
      accent-color: var(--accent);
    }

    select {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--ink);
      background: #ffffff;
      font: inherit;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 13px 18px;
      min-width: 112px;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
    }

    #play {
      color: #ffffff;
      background: var(--accent);
    }

    #play:hover {
      background: var(--accent-dark);
    }

    #stop {
      color: var(--ink);
      background: #edf1ed;
    }

    #stop:hover {
      background: #e1e7e1;
    }

    .note {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--warn);
      font-size: 0.92rem;
    }

    @media (max-width: 620px) {
      body {
        padding: 14px;
      }

      header,
      .controls {
        grid-template-columns: 1fr;
        display: grid;
      }

      .status {
        width: fit-content;
      }

      button {
        flex: 1 1 120px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Brain Sound AM Audio</h1>
        <p>가청 캐리어 톤의 진폭을 선택한 타깃 주파수로 변조해 재생합니다.</p>
      </div>
      <div id="status" class="status">정지</div>
    </header>

    <section class="controls" aria-label="audio controls">
      <label>
        베이스 음정 <span id="carrierValue" class="value">440 Hz</span>
        <input id="carrier" type="range" min="120" max="880" step="1" value="440">
      </label>

      <label>
        타깃 자극 <span id="modValue" class="value">감마 40 Hz</span>
        <select id="mod">
          <option value="40" data-label="감마 40 Hz" selected>감마 Gamma - 40Hz</option>
          <option value="8" data-label="알파/세타 8 Hz">알파/세타 Alpha &amp; Theta - 8Hz</option>
          <option value="2" data-label="델타 2 Hz">델타 Delta - 2Hz</option>
        </select>
      </label>

      <label>
        볼륨 <span id="volumeValue" class="value">20%</span>
        <input id="volume" type="range" min="0" max="70" step="1" value="20">
      </label>

      <label>
        지속 시간 <span id="durationValue" class="value">15분</span>
        <select id="duration">
          <option value="900" selected>15분</option>
          <option value="1200">20분</option>
          <option value="1800">30분</option>
        </select>
      </label>
    </section>

    <div class="actions">
      <button id="play" type="button">재생</button>
      <button id="stop" type="button">정지</button>
    </div>

    <p class="note">의료적 진단이나 치료 목적의 도구가 아닙니다. 브라우저에서 실시간 PCM 파형을 생성하며, 처음에는 낮은 볼륨으로 짧게 확인하세요.</p>
  </main>

  <script>
    const controls = {
      carrier: document.querySelector("#carrier"),
      mod: document.querySelector("#mod"),
      volume: document.querySelector("#volume"),
      duration: document.querySelector("#duration"),
    };

    const labels = {
      carrier: document.querySelector("#carrierValue"),
      mod: document.querySelector("#modValue"),
      volume: document.querySelector("#volumeValue"),
      duration: document.querySelector("#durationValue"),
      status: document.querySelector("#status"),
    };

    const playButton = document.querySelector("#play");
    const stopButton = document.querySelector("#stop");

    let audioContext;
    let source;
    let playbackId = 0;
    let workletReadyPromise;

    const amWorkletCode = `
      class AmToneProcessor extends AudioWorkletProcessor {
        constructor() {
          super();
          this.configured = false;
          this.ended = false;
          this.frame = 0;
          this.carrierPhase = 0;
          this.modPhase = 0;
          this.carrierStep = 0;
          this.modStep = 0;
          this.durationFrames = 0;
          this.fadeFrames = 1;
          this.volume = 0;

          this.port.onmessage = (event) => {
            const data = event.data;

            if (data.type === "start") {
              this.carrierStep = (2 * Math.PI * data.carrierFreq) / sampleRate;
              this.modStep = (2 * Math.PI * data.modFreq) / sampleRate;
              this.durationFrames = Math.max(1, Math.round(data.duration * sampleRate));
              this.fadeFrames = Math.max(1, Math.round(data.fadeTime * sampleRate));
              this.volume = Math.max(0, Math.min(1, data.volume));
              this.frame = 0;
              this.carrierPhase = 0;
              this.modPhase = 0;
              this.configured = true;
              this.ended = false;
            }

            if (data.type === "stop") {
              this.ended = true;
            }
          };
        }

        process(inputs, outputs) {
          const output = outputs[0];

          if (!this.configured || this.ended) {
            return !this.ended;
          }

          for (let i = 0; i < output[0].length; i += 1) {
            if (this.frame >= this.durationFrames) {
              for (let channel = 0; channel < output.length; channel += 1) {
                output[channel][i] = 0;
              }

              if (!this.ended) {
                this.ended = true;
                this.port.postMessage({ type: "ended" });
              }
              continue;
            }

            const carrier = Math.sin(this.carrierPhase);
            const envelope = 0.5 * (1 - Math.cos(this.modPhase));
            const fadeIn = Math.min(1, this.frame / this.fadeFrames);
            const fadeOut = Math.min(1, (this.durationFrames - this.frame) / this.fadeFrames);
            const fade = Math.min(fadeIn, fadeOut);
            const sample = carrier * envelope * this.volume * fade;

            for (let channel = 0; channel < output.length; channel += 1) {
              output[channel][i] = sample;
            }

            this.carrierPhase += this.carrierStep;
            this.modPhase += this.modStep;

            if (this.carrierPhase >= 2 * Math.PI) {
              this.carrierPhase -= 2 * Math.PI;
            }

            if (this.modPhase >= 2 * Math.PI) {
              this.modPhase -= 2 * Math.PI;
            }

            this.frame += 1;
          }

          return true;
        }
      }

      registerProcessor("am-tone-processor", AmToneProcessor);
    `;

    function formatDuration(seconds) {
      return `${Math.round(seconds / 60)}분`;
    }

    function updateLabels() {
      const selectedTarget = controls.mod.options[controls.mod.selectedIndex];
      labels.carrier.textContent = `${controls.carrier.value} Hz`;
      labels.mod.textContent = selectedTarget.dataset.label;
      labels.volume.textContent = `${controls.volume.value}%`;
      labels.duration.textContent = formatDuration(Number(controls.duration.value));
    }

    function setStatus(isPlaying) {
      labels.status.textContent = isPlaying ? "재생 중" : "정지";
      labels.status.classList.toggle("playing", isPlaying);
      playButton.textContent = isPlaying ? "다시 재생" : "재생";
    }

    function getAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      return audioContext || new AudioContextClass();
    }

    async function ensureAudioWorklet(context) {
      if (!context.audioWorklet) {
        return false;
      }

      if (!workletReadyPromise) {
        const workletBlob = new Blob([amWorkletCode], { type: "application/javascript" });
        const workletUrl = URL.createObjectURL(workletBlob);

        workletReadyPromise = context.audioWorklet.addModule(workletUrl)
          .then(() => true)
          .catch((error) => {
            console.warn("AudioWorklet unavailable, falling back to native nodes:", error);
            return false;
          })
          .finally(() => URL.revokeObjectURL(workletUrl));
      }

      return workletReadyPromise;
    }

    function stopSound(updateStatus = true) {
      playbackId += 1;

      if (source) {
        const currentPlayback = source;
        source = null;
        currentPlayback.stop();
      }

      if (updateStatus) {
        setStatus(false);
      }
    }

    function createNodePlayback(context, settings, currentPlaybackId) {
      const now = context.currentTime;
      const endTime = now + settings.duration;
      const carrier = context.createOscillator();
      const modulator = context.createOscillator();
      const offset = context.createConstantSource();
      const modulationDepth = context.createGain();
      const carrierGain = context.createGain();
      const masterGain = context.createGain();
      const nodes = [carrier, modulator, offset, modulationDepth, carrierGain, masterGain];
      const sourceNodes = [carrier, modulator, offset];
      const currentPlayback = {
        stop() {
          carrier.onended = null;
          sourceNodes.forEach((node) => {
            try {
              node.stop();
            } catch (error) {
              // Already stopped nodes throw in some browsers.
            }
          });
          nodes.forEach((node) => node.disconnect());
        },
      };

      carrier.type = "sine";
      carrier.frequency.setValueAtTime(settings.carrierFreq, now);
      modulator.type = "sine";
      modulator.frequency.setValueAtTime(settings.modFreq, now);
      offset.offset.setValueAtTime(settings.volume * 0.5, now);
      modulationDepth.gain.setValueAtTime(settings.volume * 0.5, now);
      carrierGain.gain.setValueAtTime(0, now);
      masterGain.gain.setValueAtTime(0, now);
      masterGain.gain.linearRampToValueAtTime(1, now + settings.fadeTime);
      masterGain.gain.setValueAtTime(1, endTime - settings.fadeTime);
      masterGain.gain.linearRampToValueAtTime(0, endTime);

      modulator.connect(modulationDepth);
      modulationDepth.connect(carrierGain.gain);
      offset.connect(carrierGain.gain);
      carrier.connect(carrierGain);
      carrierGain.connect(masterGain);
      masterGain.connect(context.destination);

      carrier.onended = () => {
        nodes.forEach((node) => node.disconnect());

        if (playbackId === currentPlaybackId && source === currentPlayback) {
          source = null;
          setStatus(false);
        }
      };

      carrier.start(now);
      modulator.start(now);
      offset.start(now);
      carrier.stop(endTime);
      modulator.stop(endTime);
      offset.stop(endTime);

      return currentPlayback;
    }

    async function createSampleAccuratePlayback(context, settings, currentPlaybackId) {
      const canUseWorklet = await ensureAudioWorklet(context);

      if (!canUseWorklet) {
        return createNodePlayback(context, settings, currentPlaybackId);
      }

      const workletNode = new AudioWorkletNode(context, "am-tone-processor", {
        numberOfInputs: 0,
        numberOfOutputs: 1,
        outputChannelCount: [2],
      });
      const currentPlayback = {
        stop() {
          workletNode.port.postMessage({ type: "stop" });
          workletNode.disconnect();
        },
      };

      workletNode.port.onmessage = (event) => {
        if (event.data.type === "ended" && playbackId === currentPlaybackId && source === currentPlayback) {
          workletNode.disconnect();
          source = null;
          setStatus(false);
        }
      };

      workletNode.connect(context.destination);
      workletNode.port.postMessage({ type: "start", ...settings });

      return currentPlayback;
    }

    async function playSound() {
      stopSound(false);
      const currentPlaybackId = playbackId + 1;
      playbackId = currentPlaybackId;
      playButton.disabled = true;

      try {
        audioContext = getAudioContext();
        if (audioContext.state === "suspended") {
          await audioContext.resume();
        }

        const settings = {
          carrierFreq: Number(controls.carrier.value),
          modFreq: Number(controls.mod.value),
          volume: Number(controls.volume.value) / 100,
          duration: Number(controls.duration.value),
          fadeTime: 0.03,
        };
        const currentPlayback = await createSampleAccuratePlayback(audioContext, settings, currentPlaybackId);

        if (playbackId !== currentPlaybackId) {
          currentPlayback.stop();
          return;
        }

        source = currentPlayback;
        setStatus(true);
      } catch (error) {
        source = null;
        setStatus(false);
        console.error("Audio playback failed:", error);
      } finally {
        playButton.disabled = false;
      }
    }

    Object.values(controls).forEach((control) => {
      const eventName = control.tagName === "SELECT" ? "change" : "input";
      control.addEventListener(eventName, updateLabels);
    });

    playButton.addEventListener("click", playSound);
    stopButton.addEventListener("click", stopSound);
    updateLabels();
  </script>
</body>
</html>
